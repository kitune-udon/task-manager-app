spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Tokyo

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  logging:
    include-stacktrace: ${APP_LOGGING_INCLUDE_STACKTRACE:true}
    level:
      application: ${APP_LOGGING_LEVEL_APPLICATION:DEBUG}
      security: ${APP_LOGGING_LEVEL_SECURITY:DEBUG}
      audit: ${APP_LOGGING_LEVEL_AUDIT:DEBUG}
