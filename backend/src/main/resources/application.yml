spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 12MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:3600000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    provider: ${APP_STORAGE_PROVIDER:LOCAL}
    local-base-path: ${APP_STORAGE_LOCAL_BASE_PATH:${java.io.tmpdir}/task-manager-app-attachments}
    s3-bucket: ${APP_STORAGE_S3_BUCKET:}
    s3-region: ${APP_STORAGE_S3_REGION:ap-northeast-1}
  logging:
    include-stacktrace: ${APP_LOGGING_INCLUDE_STACKTRACE:false}
    level:
      application: ${APP_LOGGING_LEVEL_APPLICATION:INFO}
      security: ${APP_LOGGING_LEVEL_SECURITY:INFO}
      audit: ${APP_LOGGING_LEVEL_AUDIT:INFO}
