spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Tokyo

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt:
    secret: ${JWT_SECRET:QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo0MTIzNDU2Nzg5MDEyMzQ=}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:3600000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  logging:
    include-stacktrace: ${APP_LOGGING_INCLUDE_STACKTRACE:true}
    level:
      application: ${APP_LOGGING_LEVEL_APPLICATION:DEBUG}
      security: ${APP_LOGGING_LEVEL_SECURITY:DEBUG}
      audit: ${APP_LOGGING_LEVEL_AUDIT:DEBUG}
