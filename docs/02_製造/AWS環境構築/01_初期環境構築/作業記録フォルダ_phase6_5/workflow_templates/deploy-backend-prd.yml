name: deploy-backend-prd

on:
  workflow_dispatch:
    inputs:
      # デプロイ対象の ref。通常は develop を想定。
      # 必要ならコミット SHA を直接指定して、その時点の内容を本番へ反映できる。
      ref:
        description: 'Deploy target ref. Example: develop or commit SHA'
        required: false
        default: 'develop'
      # 実行時メモ。障害対応や再デプロイ理由を Actions 実行履歴に残したいときに使う。
      deploy_note:
        description: 'Optional memo for this deploy'
        required: false
        default: ''

# OIDC で AWS ロールを引き受けるため id-token: write が必要。
# リポジトリの checkout に contents: read が必要。
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: deploy backend to production
    runs-on: ubuntu-latest

    # GitHub Environment を明示することで、production の承認ルールと
    # environment-level variables / secrets をこの job で使えるようにする。
    environment:
      name: production

    # production Environment に登録した Variables を job 単位で読み込む。
    # workflow-level ではなく job-level に置くことで、environment 解決後に参照する。
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN }}
      EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME }}
      EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME }}
      EB_S3_BUCKET: ${{ vars.EB_S3_BUCKET }}
      VERSION_LABEL_PREFIX: ${{ vars.VERSION_LABEL_PREFIX }}
      BACKEND_JAR_NAME: ${{ vars.BACKEND_JAR_NAME }}

    # backend 配下で Gradle を実行するため、run step の作業ディレクトリを固定する。
    defaults:
      run:
        working-directory: backend

    steps:
      # 指定 ref のソースコードを取得する。
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # backend は Java 17 前提なので、その版の JDK を入れる。
      # Gradle キャッシュも有効化してビルド時間を短縮する。
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # GitHub OIDC で AWS の deploy role を一時的に引き受ける。
      # 長期 access key を GitHub に置かない前提。
      - name: Configure AWS credentials by OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # gradlew が実行権限を持たない場合に備えて chmod する。
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # まずテストを通して、壊れた backend を本番へ出さないようにする。
      - name: Run tests
        run: ./gradlew test --no-daemon

      # Elastic Beanstalk に載せる JAR を作る。
      - name: Build bootJar
        run: ./gradlew bootJar --no-daemon

      # Elastic Beanstalk 用の source bundle を作る。
      # 今回は JAR と Procfile を zip 化して application version の元にする。
      - name: Prepare Elastic Beanstalk bundle
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp build/libs/${BACKEND_JAR_NAME} deploy/
          cat > deploy/Procfile <<EOF
          web: java -Dserver.port=\$SERVER_PORT -jar ${BACKEND_JAR_NAME}
          EOF
          cd deploy
          zip -r ../backend-eb-bundle.zip .

      # application version を一意に識別するための version label を作る。
      # prefix + 日時 + short SHA の形式で残し、どのコードを配備したか追えるようにする。
      - name: Create version label
        id: version
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          VERSION_LABEL="${VERSION_LABEL_PREFIX}-$(date +'%Y%m%d-%H%M')-${SHORT_SHA}"
          echo "version_label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"

      # 作成した bundle を artifact 用 S3 バケットへアップロードする。
      # この zip を元に Elastic Beanstalk application version を作成する。
      - name: Upload bundle to S3
        run: |
          aws s3 cp backend-eb-bundle.zip \
            s3://${EB_S3_BUCKET}/backend/${{ steps.version.outputs.version_label }}.zip

      # S3 上の zip を指して Elastic Beanstalk application version を作成する。
      - name: Create application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-label "${{ steps.version.outputs.version_label }}" \
            --source-bundle S3Bucket="${EB_S3_BUCKET}",S3Key="backend/${{ steps.version.outputs.version_label }}.zip"

      # 対象 environment に新しい version label を適用する。
      # 設定変更ではなく「アプリ版更新」だけを実施する想定。
      - name: Update Elastic Beanstalk environment
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${EB_ENVIRONMENT_NAME}" \
            --version-label "${{ steps.version.outputs.version_label }}"

      # デプロイ後、environment が Ready / Green / Ok になるまで待機する。
      # 途中状態を標準出力へ出すので、Actions のログから進捗確認できる。
      # あわせて「期待 version label に切り替わったか」も確認し、
      # 旧版へ戻って Green になったケースを成功扱いしないようにする。
      - name: Wait until environment is ready
        env:
          EXPECTED_VERSION_LABEL: ${{ steps.version.outputs.version_label }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time
          from datetime import datetime, timezone

          env_name = os.environ["EB_ENVIRONMENT_NAME"]
          expected_version = os.environ["EXPECTED_VERSION_LABEL"]
          timeout_sec = 1800
          interval_sec = 20
          start = time.time()
          deploy_started_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          failure_markers = (
              "Failed to deploy application",
              "Application update failed",
              "Failed Environment update activity",
              "Command failed on all instances",
              "Incorrect application version found",
          )

          while True:
              cmd = [
                  "aws", "elasticbeanstalk", "describe-environments",
                  "--environment-names", env_name,
                  "--query", "Environments[0].{Status:Status,Health:Health,HealthStatus:HealthStatus,VersionLabel:VersionLabel,AbortableOperationInProgress:AbortableOperationInProgress}",
                  "--output", "json"
              ]
              result = subprocess.check_output(cmd, text=True)
              env = json.loads(result)
              print(env)

              events_cmd = [
                  "aws", "elasticbeanstalk", "describe-events",
                  "--environment-name", env_name,
                  "--start-time", deploy_started_at,
                  "--query", "Events[].Message",
                  "--output", "json"
              ]
              event_messages = json.loads(subprocess.check_output(events_cmd, text=True))
              matched_failure = next(
                  (
                      marker
                      for message in event_messages
                      for marker in failure_markers
                      if marker in message
                  ),
                  None
              )

              if matched_failure:
                  print(
                      "Elastic Beanstalk reported a deployment failure event after this rollout started: "
                      f"{matched_failure}",
                      file=sys.stderr
                  )
                  sys.exit(1)

              if (
                  env.get("Status") == "Ready"
                  and env.get("Health") == "Green"
                  and env.get("HealthStatus") == "Ok"
                  and env.get("VersionLabel") == expected_version
              ):
                  break

              if (
                  env.get("Status") == "Ready"
                  and not env.get("AbortableOperationInProgress", False)
                  and env.get("VersionLabel") != expected_version
              ):
                  print(
                      "Environment returned to Ready without switching to the expected version label. "
                      f"expected={expected_version} actual={env.get('VersionLabel')}",
                      file=sys.stderr
                  )
                  sys.exit(1)

              if time.time() - start > timeout_sec:
                  print(
                      "Timed out waiting for Elastic Beanstalk environment to become healthy. "
                      f"expected={expected_version} actual={env.get('VersionLabel')}",
                      file=sys.stderr
                  )
                  sys.exit(1)

              time.sleep(interval_sec)
          PY

      # 失敗時は environment の現在状態を吐き出して切り分けしやすくする。
      - name: Describe Elastic Beanstalk environment on failure
        if: failure()
        run: |
          aws elasticbeanstalk describe-environments \
            --environment-names "${EB_ENVIRONMENT_NAME}" \
            --output json

      # 失敗時は直近イベントも出して、rollback や設定エラーを追いやすくする。
      - name: Describe recent Elastic Beanstalk events on failure
        if: failure()
        run: |
          aws elasticbeanstalk describe-events \
            --environment-name "${EB_ENVIRONMENT_NAME}" \
            --max-records 30 \
            --output table

      # 最後に version label と任意メモを残して、何を配備したか確認しやすくする。
      - name: Print deploy summary
        run: |
          echo "Backend deploy completed"
          echo "version_label=${{ steps.version.outputs.version_label }}"
          echo "deploy_note=${{ inputs.deploy_note }}"
