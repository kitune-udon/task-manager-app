name: deploy-frontend-prd

on:
  workflow_dispatch:
    inputs:
      # デプロイ対象の ref。通常は develop を想定。
      # 必要ならコミット SHA を指定して、その時点の frontend を本番へ反映できる。
      ref:
        description: 'Deploy target ref. Example: develop or commit SHA'
        required: false
        default: 'develop'
      # 実行時メモ。再デプロイ理由や確認ポイントを残したいときに使う。
      deploy_note:
        description: 'Optional memo for this deploy'
        required: false
        default: ''

# OIDC で AWS ロールを引き受けるため id-token: write が必要。
# リポジトリの checkout に contents: read が必要。
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: deploy frontend to production
    runs-on: ubuntu-latest

    # production Environment を明示することで、承認ルールと
    # environment-level variables / secrets をこの job に適用する。
    environment:
      name: production

    # production Environment に登録した Variables を job 単位で読む。
    # workflow-level ではなく job-level に置き、environment 解決後に参照する。
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN }}
      FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      CLOUDFRONT_SPA_FUNCTION_NAME: taskflow-prd-spa-router

    # frontend 配下で npm build を実行するため、作業ディレクトリを固定する。
    defaults:
      run:
        working-directory: frontend

    steps:
      # 指定 ref のソースコードを取得する。
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # frontend は Vite 8 系前提なので、対応する Node.js 22.12 を使う。
      # package-lock.json を使って npm キャッシュも有効化する。
      - name: Set up Node.js 22.12
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # GitHub OIDC で AWS の deploy role を一時的に引き受ける。
      # 長期 access key は使わない。
      - name: Configure AWS credentials by OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # package-lock.json に従って依存をクリーンインストールする。
      - name: Install dependencies
        run: npm ci

      # 本番配信用の静的ファイルを dist/ に作成する。
      - name: Build frontend
        run: npm run build

      # dist の中身を S3 バケットへ反映する。
      # index.html 以外は長めの cache-control を付け、index.html だけ no-cache にする。
      # こうすることで SPA の HTML は新しい版を取りに行きつつ、ハッシュ付き静的資産はキャッシュを効かせられる。
      - name: Upload dist to S3
        run: |
          aws s3 sync dist/ s3://${FRONTEND_BUCKET}/ \
            --delete \
            --cache-control 'public,max-age=31536000,immutable' \
            --exclude 'index.html'
          aws s3 cp dist/index.html s3://${FRONTEND_BUCKET}/index.html \
            --cache-control 'no-cache,no-store,must-revalidate'

      # SPA deep link の rewrite は CloudFront Function で扱い、
      # distribution 全体の 403/404 -> index.html 変換には依存しない。
      # これにより /api/* の 401/403/404 を画面配信用 HTML へ誤変換しない。
      - name: Ensure CloudFront SPA routing configuration
        run: node ./scripts/ensure-cloudfront-spa-routing.mjs

      # CloudFront のキャッシュを失効し、新しい frontend をすぐ配信できるようにする。
      - name: Create CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths '/*'

      # 実行結果の要約を出力し、どの Distribution に反映したか確認しやすくする。
      - name: Print deploy summary
        run: |
          echo "Frontend deploy completed"
          echo "distribution_id=${CLOUDFRONT_DISTRIBUTION_ID}"
          echo "deploy_note=${{ inputs.deploy_note }}"
